name: Build Workflow

run-name: Build Workflow -- ${{ github.head_ref || github.ref_name }}

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          cache: maven

      - name: Build, Test, and Enforce Coverage Gate
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Show JaCoCo output
        if: always()
        run: |
          ls -R target || true
          test -f target/site/jacoco/jacoco.xml

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/**
            target/jacoco.exec
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: './target/site/jacoco/*.xml'
          #          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true